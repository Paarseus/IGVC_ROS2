# Sim-specific Nav2 parameter overrides for Webots simulation.
#
# Overrides: slower speed, relaxed progress checker, no collision detection
# (VelodynePuck sees ground as obstacles), no camera_depth (Webots
# RangeFinder doesn't publish PointCloud2), larger local costmap.

controller_server:
  ros__parameters:
    progress_checker:
      required_movement_radius: 0.1
      movement_time_allowance: 120.0    # sim runs slower than real time
    FollowPath:
      desired_linear_vel: 1.0           # slower for sim stability
      use_collision_detection: false    # VelodynePuck sees ground as obstacles

local_costmap:
  local_costmap:
    ros__parameters:
      width: 100
      height: 100
      resolution: 0.5
      voxel_layer:
        observation_sources: velodyne_points   # no camera_depth in sim (Webots RangeFinder != PointCloud2)
