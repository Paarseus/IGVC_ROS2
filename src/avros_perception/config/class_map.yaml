# Class map — single source of truth for perception class IDs.
#
# The node reads this at startup, constructs a vision_msgs/LabelInfo, and
# publishes it as a latched (transient_local) topic. kiwicampus uses the
# id <-> name mapping to decide which class each mask pixel represents.
#
# When adding a new class here, also add its name to one of the class_types
# blocks in nav2_params.yaml (e.g. under `danger.classes: [...]`) so the
# plugin knows what cost to write for pixels with that class ID. The
# semantic_front layer's class_types list must cover every name you expect
# kiwicampus to cost. Names not listed there are silently ignored.

classes:
  - {id: 0,   name: free,          rgb: [  0, 255,   0]}
  - {id: 1,   name: lane_white,    rgb: [255, 255, 255]}
  - {id: 2,   name: barrel_orange, rgb: [255, 128,   0]}
  - {id: 3,   name: pothole,       rgb: [128,   0, 128]}
  - {id: 255, name: unknown,       rgb: [128, 128, 128]}
