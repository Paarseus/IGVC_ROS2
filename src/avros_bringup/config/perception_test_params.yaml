# Slim Nav2 params for perception_test.launch.py — front camera +
# semantic_segmentation_layer ONLY. No LiDAR, no global_costmap, no
# planner/route/BT. Use to verify the camera→mask→cloud→costmap pipeline
# end-to-end without obstacle-source contamination from the Velodyne.
#
# Differences from nav2_params_humble.yaml:
#   - local_costmap.plugins drops voxel_layer (LiDAR removed entirely)
#   - global_costmap absent (controller_server runs only local)
#   - inflation_radius reduced to 0.3 m so a small number of detections
#     produces an obvious cluster of cells (1.5 m radius would smear it
#     across the whole map for testing)
#   - tile_map_decay_time bumped to 5.0 — Phase 5 experiment 2026-04-28
#   - controller plugins kept as no-op placeholders so controller_server
#     starts cleanly; nothing should ever send a path here

controller_server:
  ros__parameters:
    controller_frequency: 5.0
    min_x_velocity_threshold: 0.01
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.01
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3
      movement_time_allowance: 120.0

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 2.0
      yaw_goal_tolerance: 0.5
      stateful: true

    # Placeholder controller — never invoked in this test launch
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.0
      lookahead_dist: 1.0
      use_rotate_to_heading: false
      use_collision_detection: false
      transform_tolerance: 1.0

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      always_send_full_costmap: true
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 20
      height: 20
      resolution: 0.1
      robot_radius: 0.4
      plugins: ["semantic_layer", "inflation_layer"]

      semantic_layer:
        plugin: "semantic_segmentation_layer::SemanticSegmentationLayer"
        enabled: true
        observation_sources: front
        front:
          segmentation_topic: /perception/front/semantic_mask
          pointcloud_topic: /perception/front/semantic_points
          confidence_topic: /perception/front/semantic_confidence
          labels_topic: /perception/front/label_info
          max_obstacle_distance: 8.0
          min_obstacle_distance: 0.3
          tile_map_decay_time: 5.0
          observation_persistence: 0.0
          expected_update_rate: 0.0
          # PR3 raytrace clearing: walk Bresenham rays from sensor origin to
          # each observed point, marking cells along the way as FREE_SPACE.
          # This is the architecturally-correct fix for stale LETHAL cells
          # not decaying — see kiwicampus_pr3_raytrace_clear.patch.
          clearing: true
          raytrace_max_range: 8.0
          raytrace_min_range: 0.0
          visualize_tile_map: true
          use_cost_selection: false
          class_types: ["danger"]
          danger:
            classes: ["lane_white", "barrel_orange", "pothole"]
            base_cost: 254
            max_cost: 254
            mark_confidence: 0
            samples_to_max_cost: 0
            dominant_priority: false

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.3
