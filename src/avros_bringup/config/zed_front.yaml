# ZED X Front Camera — override YAML layered on top of wrapper defaults
# (common_stereo.yaml + zedx.yaml) via ros_params_override_path.
#
# Serial is passed by the launch file (not this YAML). Currently using
# 49910017 (known-good unit) until the physical-front serial is verified.
#
# Topic tree (after the launch-file fix that drops explicit namespace/node_name):
#   /zed_front/zed_node/rgb/image_rect_color        (sensor_msgs/Image)
#   /zed_front/zed_node/point_cloud/cloud_registered (organized sensor_msgs/PointCloud2)
#
# camera_model, camera_name, publish_tf are set by launch args, NOT here.

/**:
  ros__parameters:
    # ZED X native resolutions: 'HD1200' | 'HD1080' | 'SVGA' | 'AUTO'.
    # Frame rates for HD1200/HD1080: 60 | 30 | 15. HD720 is NOT supported.
    # camera_name / serial_number / camera_model are set by launch args.
    general:
      grab_resolution: 'HD1080'
      grab_frame_rate: 15
      pub_frame_rate: 15.0

    depth:
      depth_mode: 'NEURAL_LIGHT'        # v5.2 enum: NONE | NEURAL_LIGHT | NEURAL | NEURAL_PLUS
      min_depth: 0.3
      max_depth: 15.0
      point_cloud_freq: 15.0            # match image rate for ApproximateTime sync
      # depth_stabilization=1 (minimum smoothing) instead of SDK-default (-1).
      # SDK default forces pos_tracking on AND runs heavier temporal filter -> 34% mean GPU.
      # Setting to 1 keeps the wrapper happy (cloud still publishes) at 27% mean GPU.
      # Setting to 0 disables cloud generation entirely on this wrapper version.
      # See docs/CHANGELOG_2026-04-27.md for diagnosis (forced pos_tracking via warning).
      depth_stabilization: 1

    # EKF+Xsens+GPS owns localization, but pos_tracking MUST be on for the
    # ZED wrapper to publish the organized point_cloud (cloud breaks if pos_tracking
    # is off, regardless of depth_mode). Set explicitly to true so the wrapper
    # doesn't print the misleading "forced to ENABLE" warning every launch.
    pos_tracking:
      pos_tracking_enabled: true
    mapping:
      mapping_enabled: false
    object_detection:
      od_enabled: false
    body_tracking:
      bt_enabled: false

    sensors:
      sensors_image_sync: true
      publish_imu: false
      publish_mag: false
      publish_baro: false
      publish_temp: false
