# ZED X Front Camera — override YAML layered on top of wrapper defaults
# (common_stereo.yaml + zedx.yaml) via ros_params_override_path.
#
# Topic tree (after the launch-file fix that drops explicit namespace/node_name):
#   /zed_front/zed_node/rgb/image_rect_color        (sensor_msgs/Image)
#   /zed_front/zed_node/point_cloud/cloud_registered (organized sensor_msgs/PointCloud2)
#
# camera_model, camera_name, publish_tf are set by launch args, NOT here.

/**:
  ros__parameters:
    # ZED X native resolutions: 'HD1200' | 'HD1080' | 'SVGA' | 'AUTO'.
    # Frame rates for HD1200/HD1080: 60 | 30 | 15. HD720 is NOT supported.
    # camera_name / serial_number / camera_model are set by launch args.
    general:
      grab_resolution: 'HD1080'
      grab_frame_rate: 15
      pub_frame_rate: 15.0

    depth:
      depth_mode: 'NEURAL_LIGHT'        # v5.2 enum: NONE | NEURAL_LIGHT | NEURAL | NEURAL_PLUS
      min_depth: 0.3
      max_depth: 15.0
      point_cloud_freq: 15.0            # match image rate for ApproximateTime sync

    # Disable unused subsystems — EKF+Xsens+GPS owns localization,
    # avros_perception does its own classification.
    pos_tracking:
      pos_tracking_enabled: false
    mapping:
      mapping_enabled: false
    object_detection:
      od_enabled: false
    body_tracking:
      bt_enabled: false

    sensors:
      sensors_image_sync: true
      publish_imu: false
      publish_mag: false
      publish_baro: false
      publish_temp: false
