# ZED X Left Camera — override YAML layered on top of wrapper defaults
# (common_stereo.yaml + zedx.yaml) via ros_params_override_path.
#
# Mounted: left side of vehicle, facing left.
# Serial / camera_model / camera_name are set by launch args — not here.

/**:
  ros__parameters:
    # SVGA on the sides — IGVC C2 cost-model decision (see CLAUDE.md / docs).
    # Front stays HD1080 for full-res lane/barrel detection; sides drop to
    # SVGA (960×600) to preserve GPU/thermal headroom on Orin AGX while
    # still publishing an organized cloud so the kiwicampus
    # semantic_segmentation_layer's `left` observation_source has something
    # to project mask pixels into.
    general:
      grab_resolution: 'SVGA'
      grab_frame_rate: 15
      pub_frame_rate: 15.0

    depth:
      depth_mode: 'NEURAL_LIGHT'
      min_depth: 0.3
      max_depth: 8.0                    # tightened: side coverage only needs to reach the 5m semantic_layer horizon
      point_cloud_freq: 15.0
      depth_stabilization: 1            # see zed_front.yaml for why (pos_tracking force-enable trap)

    pos_tracking:
      pos_tracking_enabled: true        # required for cloud generation; disabled has no effect (force-enabled by depth_stab)
    mapping:
      mapping_enabled: false
    object_detection:
      od_enabled: false
    body_tracking:
      bt_enabled: false

    sensors:
      sensors_image_sync: true
      publish_imu: false
      publish_mag: false
      publish_baro: false
      publish_temp: false
