# Nav2 parameters for AVROS — Humble version
# Ackermann vehicle: wheelbase 1.23m, max steer 28deg, min turn radius 2.31m
#
# KEEP IN SYNC with nav2_params.yaml (Jazzy). Differences:
#   - bt_navigator.plugin_lib_names: required (Jazzy auto-discovers)
#   - SmacPlannerHybrid plugin: '/' notation (Jazzy uses '::')
#   - behavior plugins: '/' notation (Jazzy uses '::')

bt_navigator:
  ros__parameters:
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odometry/filtered
    bt_loop_duration: 10
    default_server_timeout: 20
    # BT XML path resolved at launch time via navigation.launch.py
    default_nav_to_pose_bt_xml: ""
    default_nav_through_poses_bt_xml: ""
    goal_reached_tol: 3.0       # GoalReached BT condition tolerance (meters)
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    # Humble requires explicit BT plugin list (Jazzy auto-discovers)
    plugin_lib_names:
      - nav2_compute_route_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_wait_action_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_rate_controller_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_goal_reached_condition_bt_node

controller_server:
  ros__parameters:
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.01
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.01
    progress_checker_plugin: "progress_checker"   # Humble: singular string (not list)
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3
      movement_time_allowance: 120.0    # 2 min — patient enough for pedestrians/temporary obstacles

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 2.0
      yaw_goal_tolerance: 0.5
      stateful: true

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 1.0
      lookahead_dist: 3.0
      min_lookahead_dist: 3.0
      max_lookahead_dist: 8.0
      lookahead_time: 1.5
      rotate_to_heading_angular_vel: 0.5
      use_rotate_to_heading: false    # Ackermann vehicle cannot rotate in place
      use_velocity_scaled_lookahead_dist: true
      min_approach_linear_velocity: 0.3
      approach_velocity_scaling_dist: 3.0      # must be > xy_goal_tolerance for deceleration to work
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 5.0
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: true
      cost_scaling_dist: 1.8
      cost_scaling_gain: 1.0
      regulated_linear_scaling_min_radius: 2.31    # min turn radius
      regulated_linear_scaling_min_speed: 0.3
      max_angular_accel: 1.0
      allow_reversing: false
      max_robot_pose_search_dist: 999.0    # search entire path — skips route waypoints behind the robot
      transform_tolerance: 1.0

planner_server:
  ros__parameters:
    expected_planner_frequency: 2.0
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"    # Humble: '/' (has name= in plugin.xml)
      tolerance: 0.5
      downsample_costmap: false
      downsampling_factor: 1
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 5.0
      motion_model_for_search: "DUBIN"
      angle_quantization_bins: 72
      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 3.0
      minimum_turning_radius: 2.31    # wheelbase / tan(max_steer)
      lookup_table_size: 20.0
      cache_obstacle_heuristic: false
      smooth_path: true
      reverse_penalty: 2.0
      change_penalty: 0.0
      non_straight_penalty: 1.2
      cost_penalty: 2.0

behavior_server:
  ros__parameters:
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["backup", "drive_on_heading", "wait"]
    backup:
      plugin: "nav2_behaviors/BackUp"               # Humble: '/' (has name= in plugin.xml)
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"        # Humble: '/'
    wait:
      plugin: "nav2_behaviors/Wait"                  # Humble: '/'

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      always_send_full_costmap: true
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 50
      height: 50
      resolution: 0.2
      robot_radius: 0.8
      plugins: ["voxel_layer", "semantic_front", "semantic_left", "semantic_right", "inflation_layer"]

      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        publish_voxel_map: true
        origin_z: 0.0
        z_resolution: 0.2
        z_voxels: 10
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: velodyne_points camera_depth
        velodyne_points:
          topic: /velodyne_points
          max_obstacle_height: 2.0
          min_obstacle_height: -0.5      # Sensor at z=1.0m; -0.5 = 0.5m above ground (knee height)
          obstacle_max_range: 15.0
          obstacle_min_range: 1.0
          clearing: true
          marking: true
          data_type: "PointCloud2"
          raytrace_max_range: 20.0
          raytrace_min_range: 1.0
        camera_depth:
          topic: /camera/camera/depth/color/points
          sensor_frame: camera_depth_optical_frame
          max_obstacle_height: 1.5
          min_obstacle_height: -0.5
          obstacle_max_range: 5.0
          obstacle_min_range: 0.3
          clearing: false
          marking: true
          data_type: "PointCloud2"
          raytrace_max_range: 5.0
          raytrace_min_range: 0.3

      # kiwicampus/semantic_segmentation_layer — consumes the avros_perception 3-topic contract
      # from the front ZED X. Additive to voxel_layer; it writes cost from camera-classified
      # pixels (lane paint, barrels, etc) that LiDAR cannot see.
      semantic_front:
        plugin: "semantic_segmentation_layer::SemanticSegmentationLayer"
        enabled: true
        # observation_sources is a SPACE-SEPARATED string (same as VoxelLayer),
        # NOT a YAML list. For Phase 5 multi-cam use e.g. "front left right".
        observation_sources: front
        front:
          segmentation_topic: /perception/front/semantic_mask
          pointcloud_topic: /perception/front/semantic_points
          confidence_topic: /perception/front/semantic_confidence
          labels_topic: /perception/front/label_info
          max_obstacle_distance: 5.0      # ZED X usable depth for painted features; widen only for debug
          min_obstacle_distance: 0.3
          tile_map_decay_time: 1.5        # seconds; paint fades if not re-observed
          observation_persistence: 0.0
          expected_update_rate: 0.0
          visualize_tile_map: false       # flip to true for debugging; publishes /local_costmap/front/tile_map
          use_cost_selection: false
          class_types: ["danger"]
          danger:
            classes: ["lane_white", "barrel_orange", "pothole"]
            base_cost: 254
            max_cost: 254
            mark_confidence: 0
            samples_to_max_cost: 1
            dominant_priority: true

      # Mirror of semantic_front for the left-side ZED X camera.
      semantic_left:
        plugin: "semantic_segmentation_layer::SemanticSegmentationLayer"
        enabled: true
        observation_sources: left
        left:
          segmentation_topic: /perception/left/semantic_mask
          pointcloud_topic: /perception/left/semantic_points
          confidence_topic: /perception/left/semantic_confidence
          labels_topic: /perception/left/label_info
          max_obstacle_distance: 5.0
          min_obstacle_distance: 0.3
          tile_map_decay_time: 1.5
          observation_persistence: 0.0
          expected_update_rate: 0.0
          visualize_tile_map: false
          use_cost_selection: false
          class_types: ["danger"]
          danger:
            classes: ["lane_white", "barrel_orange", "pothole"]
            base_cost: 254
            max_cost: 254
            mark_confidence: 0
            samples_to_max_cost: 1
            dominant_priority: true

      # Mirror of semantic_front for the right-side ZED X camera.
      semantic_right:
        plugin: "semantic_segmentation_layer::SemanticSegmentationLayer"
        enabled: true
        observation_sources: right
        right:
          segmentation_topic: /perception/right/semantic_mask
          pointcloud_topic: /perception/right/semantic_points
          confidence_topic: /perception/right/semantic_confidence
          labels_topic: /perception/right/label_info
          max_obstacle_distance: 5.0
          min_obstacle_distance: 0.3
          tile_map_decay_time: 1.5
          observation_persistence: 0.0
          expected_update_rate: 0.0
          visualize_tile_map: false
          use_cost_selection: false
          class_types: ["danger"]
          danger:
            classes: ["lane_white", "barrel_orange", "pothole"]
            base_cost: 254
            max_cost: 254
            mark_confidence: 0
            samples_to_max_cost: 1
            dominant_priority: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.5
        inflation_radius: 1.8

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 0.5
      global_frame: map
      robot_base_frame: base_link
      rolling_window: true
      width: 100
      height: 100
      resolution: 0.2
      robot_radius: 0.8
      track_unknown_space: false
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: velodyne_points
        velodyne_points:
          topic: /velodyne_points
          max_obstacle_height: 2.0
          min_obstacle_height: -0.5      # Sensor at z=1.0m; -0.5 = 0.5m above ground
          obstacle_max_range: 50.0
          obstacle_min_range: 1.0
          clearing: true
          marking: true
          data_type: "PointCloud2"
          raytrace_max_range: 50.0
          raytrace_min_range: 1.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.5
        inflation_radius: 1.8

velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [2.0, 0.0, 1.0]       # [vx, vy, omega]
    min_velocity: [-0.5, 0.0, -1.0]
    max_accel: [0.5, 0.0, 1.0]
    max_decel: [-1.0, 0.0, -1.0]
    odom_topic: /odometry/filtered
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

route_server:
  ros__parameters:
    base_frame: "base_link"
    route_frame: "map"
    global_frame: "map"
    max_planning_time: 2.0
    prune_route: true
    path_density: 0.5
    smooth_corners: false             # dense graph nodes follow road curves; smoothing can distort path
    graph_filepath: ""   # Overridden at launch time
    graph_file_loader: "GeoJsonGraphFileLoader"
    GeoJsonGraphFileLoader:
      plugin: "nav2_route::GeoJsonGraphFileLoader"
    edge_cost_functions: ["DistanceScorer"]
    DistanceScorer:
      plugin: "nav2_route::DistanceScorer"
      weight: 1.0
