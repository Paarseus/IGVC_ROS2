# Humble plugin name overrides.
# nav2_behaviors and nav2_smac_planner register with name="pkg/Class"
# in their plugin.xml, requiring '/' notation on Humble's pluginlib.
# Other Nav2 packages use type="pkg::Class" and accept '::' directly.
# Jazzy's pluginlib accepts '::' for all packages.

planner_server:
  ros__parameters:
    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"

behavior_server:
  ros__parameters:
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
