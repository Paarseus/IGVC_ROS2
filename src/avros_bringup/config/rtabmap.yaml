# RTAB-Map SLAM configuration for outdoor multi-sensor operation
# VLP-16 ICP odometry + 3× RGB-D cameras + IMU + GPS priors
# Used by slam_navigation.launch.py
#
# References:
#   - rtabmap_examples/launch/lidar3d.launch.py (official VLP-16 example)
#   - KITTI benchmark scripts (outdoor vehicle tuning)
#   - rtabmap_ros issues #453, #651, #1078 (multi-camera + GPS)

# Shared by both icp_odometry and rtabmap nodes
/**:
  ros__parameters:
    # ── Coordinate Frames ─────────────────────────────────────
    frame_id: "base_link"
    odom_frame_id: "odom"
    map_frame_id: "map"

    # ── ICP LiDAR Configuration ───────────────────────────────
    # Outdoor VLP-16 tuning from lidar3d.launch.py
    Icp/Strategy: "1"                        # libpointmatcher (more robust than PCL)
    Icp/VoxelSize: "0.5"                     # Outdoor: 0.5+ (was 0.3 indoor)
    Icp/PointToPlane: "true"                 # Better on flat ground + building facades
    Icp/Iterations: "10"                     # 10 sufficient outdoors (was 20)
    Icp/MaxCorrespondenceDistance: "5.0"      # voxel_size × 10 (was 0.15 — WAY too low)
    Icp/MaxTranslation: "3.0"                # Safe for up to ~15 km/h
    Icp/CorrespondenceRatio: "0.01"          # Odom: 1% match ok (was 0.1)
    Icp/PointToPlaneK: "20"
    Icp/Epsilon: "0.001"
    Icp/OutlierRatio: "0.7"                  # Trimmed outlier filter for noisy scans

    # ── Visual Features ───────────────────────────────────────
    # KITTI outdoor benchmark tuning
    Vis/MaxFeatures: "600"                   # More features for outdoor (was 400)
    Vis/MinInliers: "20"                     # Stricter matching outdoor (was 15)
    Vis/InlierDistance: "0.1"
    Vis/EstimationType: "0"                  # REQUIRED: 3D-3D for multi-camera
    SURF/HessianThreshold: "300"
    GFTT/MinDistance: "7"                    # KITTI outdoor standard
    Kp/MaxFeatures: "400"                    # Bag-of-words features

    # ── Odometry (Frame-to-Map) ───────────────────────────────
    Odom/Strategy: "0"                       # F2M: more robust than F2F outdoors
    Odom/ResetCountdown: "1"
    Odom/ScanKeyFrameThr: "0.4"              # New keyframe when <40% overlap
    Odom/Holonomic: "false"                  # Ackermann vehicle
    OdomF2M/ScanMaxSize: "15000"             # Outdoor local map (was 10000)
    OdomF2M/ScanSubtractRadius: "0.5"        # Match voxel size
    OdomF2M/BundleAdjustment: "0"            # Disabled for multi-camera

    # ── Core SLAM ─────────────────────────────────────────────
    Rtabmap/DetectionRate: "1"
    Rtabmap/TimeThr: "900"                   # More headroom for multi-cam+lidar (was 700)
    Rtabmap/MemoryThr: "0"
    Rtabmap/LoopThr: "0.11"                  # Default — GPS constraint is better defense
    Rtabmap/LoopGPS: "true"                  # GPS-constrained loop closure search

    # ── Memory ────────────────────────────────────────────────
    Mem/IncrementalMemory: "true"
    Mem/InitWMWithAllNodes: "false"
    Mem/STMSize: "30"                        # KITTI outdoor benchmark (was 10)
    Mem/UseOdomGravity: "true"

    # ── Registration & Loop Closure ───────────────────────────
    Reg/Strategy: "2"                        # Visual+ICP: cameras detect, lidar refines (was 1)
    RGBD/LoopClosureIdentityGuess: "true"
    RGBD/LinearUpdate: "0.5"                 # New node every 0.5m at vehicle speed (was 0.1)
    RGBD/AngularUpdate: "0.1"                # ~5.7 degrees (was 0.05)
    RGBD/ProximityBySpace: "true"            # Spatial proximity detection
    RGBD/ProximityMaxGraphDepth: "100"       # Large graph support
    RGBD/NewMapOdomChangeDistance: "0"
    RGBD/OptimizeFromGraphEnd: "false"       # Anchor to first node (GPS origin)
    RGBD/OptimizeMaxError: "0.0"             # Must be 0 when Robust=true
    RGBD/CreateOccupancyGrid: "false"        # Nav2 costmaps handle obstacles

    # ── Graph Optimization ────────────────────────────────────
    Optimizer/Strategy: "2"                  # GTSAM: best for GPS priors (was 1/g2o)
    Optimizer/Iterations: "60"
    Optimizer/Epsilon: "0.00001"
    Optimizer/Robust: "true"                 # Handles GPS outliers
    Optimizer/PriorsIgnored: "false"         # Enable GPS priors
    Optimizer/GravitySigma: "0.3"            # IMU gravity constraint

    # ── Point Cloud Filtering ─────────────────────────────────
    cloud_voxel_size: 0.05
    cloud_output_voxelized: true
    cloud_max_depth: 20.0
    cloud_min_depth: 0.3

    # ── 2D Grid (Nav2 compatible) ─────────────────────────────
    Grid/3D: "false"                         # Nav2 costmap is 2D (was true)
    Grid/CellSize: "0.1"                     # 10cm outdoor resolution (was 0.05)
    Grid/NormalsSegmentation: "false"        # Passthrough filter (simpler)
    Grid/RangeMax: "50.0"
    Grid/RangeMin: "0.5"
    Grid/MaxGroundHeight: "0.1"
    Grid/MaxObstacleHeight: "2.0"
    Grid/ClusterRadius: "0.1"
    Grid/GroundIsObstacle: "false"
